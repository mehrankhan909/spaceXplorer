{% extends 'base.html' %}

{% block title %}Reports - Space Missions Explorer{% endblock %}
{% block page_id %}reports{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div>
        <h4 class="fw-bold mb-1"><i class="fas fa-file-alt me-2 text-primary"></i>Reports</h4>
        <small class="text-muted">Generate and export data reports</small>
    </div>
    <div class="d-flex gap-2 flex-wrap">
        <a href="{% url 'reports:export_csv' %}" class="btn glass-btn btn-sm"><i class="fas fa-file-csv me-1 text-success"></i>Export CSV</a>
        <a href="{% url 'reports:export_excel' %}" class="btn glass-btn btn-sm"><i class="fas fa-file-excel me-1 text-success"></i>Export Excel</a>
        <button class="btn glass-btn btn-sm" onclick="window.print()"><i class="fas fa-print me-1"></i>Print</button>
    </div>
</div>

<div id="reportSummary">
    <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="skeleton" style="height:120px;border-radius:12px;"></div></div>
        <div class="col-md-4"><div class="skeleton" style="height:120px;border-radius:12px;"></div></div>
        <div class="col-md-4"><div class="skeleton" style="height:120px;border-radius:12px;"></div></div>
    </div>
    <div class="skeleton" style="height:300px;border-radius:12px;"></div>
</div>
{% endblock %}
